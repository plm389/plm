<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Search</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            word-break: break-word; /* Fix long cell content wrapping */
        }
    </style>
</head>
<body>
    <h1>CSV Search</h1>
    <table>
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
                <th>Header 3</th>
            </tr>
        </thead>
        <tbody>
            <!-- Populate table rows here -->
        </tbody>
    </table>
    <script>
        function normalizeText(text) {
            // Function to normalize text by removing accents for better display
            return text.normalize('NFD').replace(/[-]/g, '');
        }
    </script>
</body>
</html>
